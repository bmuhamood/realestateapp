# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: uganda_property
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    networks:
      - app_network

  backend:
    build: ./backend
    command: gunicorn realestate.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      DATABASE_URL: postgresql://admin:secure_password@postgres:5432/uganda_property
      REDIS_URL: redis://redis:6379
      DEBUG: 'False'
    depends_on:
      - postgres
      - redis
    networks:
      - app_network

  celery:
    build: ./backend
    command: celery -A realestate worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      DATABASE_URL: postgresql://admin:secure_password@postgres:5432/uganda_property
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/var/www/media
      - ./frontend/build:/var/www/frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:
  media_files:

networks:
  app_network:
    driver: bridge